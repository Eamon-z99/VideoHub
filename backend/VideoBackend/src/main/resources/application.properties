spring.application.name=VideoBackend
# 与前端代理保持一致的端口
server.port=8080
# 允许路径变量匹配多级子目录
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# 媒体根目录（用于数据库视频存储与封面），本地磁盘路径
media.storage.root=E:\\Videos

# 是否启用 CDN/云存储前缀；true 用云，false 用本地 /local-videos（默认 false）
media.cdn.enabled=true

# CDN/云存储访问前缀（保持与本地相对路径一致的根目录）
# 示例：百度 BOS + CDN 域名
media.cdn.base-url=https://videohub-1355211627.cos.ap-guangzhou.myqcloud.com/Videos


# 动态图片存储根目录与 CDN 配置
feed.image.storage.root=E:\\FeedImages
# 动态图片是否启用 CDN；默认继承 media.cdn.enabled
feed.image.cdn.enabled=true
# 动态图片 CDN 前缀；建议使用 /feed-images 根
feed.image.cdn.base-url=https://videohub-1355211627.cos.ap-guangzhou.myqcloud.com/FeedImages

# 头像存储根目录与 CDN 配置
avatar.storage.root=E:\\Avatars
# 头像是否启用 CDN；默认继承 media.cdn.enabled
avatar.cdn.enabled=true
# 头像 CDN 前缀；建议使用 /avatars 根
avatar.cdn.base-url=https://videohub-1355211627.cos.ap-guangzhou.myqcloud.com/Avatars

# 定时发布扫描配置（当前按每秒执行，空扫描不打印日志）
video.publish.scheduler.enabled=true
# 每秒执行一次（6位 cron，含秒）
video.publish.scheduler.cron=*/1 * * * * *

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/videoshub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置（可选，如果使用JPA）
# spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10GB
spring.servlet.multipart.max-request-size=10GB

# FFmpeg配置（如果不在PATH中，使用完整路径）
ffmpeg.path=ffmpeg
ffprobe.path=ffprobe

# 转码配置
transcode.segment-duration=4
transcode.qualities=1080p:4M:8M,720p:2M:4M,480p:1M:2M
transcode.audio-bitrate=128k

# JWT配置
jwt.secret=VideoHubSecretKeyForJWTTokenGeneration2024
jwt.expiration=86400000

# Redis（弹幕等高频功能）
# WSL 安装的 redis-server 默认端口 6379；Windows 侧访问一般用 localhost 即可
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------- Elasticsearch（主页 / 顶栏视频搜索）----------
# 设为 true 且配置下方 uris 后，POST /api/db/videos/search 优先走 ES；失败或未启用时仍用 MySQL LIKE。
videohub.elasticsearch.enabled=true
videohub.elasticsearch.reindex-on-startup=true
videohub.elasticsearch.index-name=videohub_videos

# Elasticsearch 8.x：默认 HTTPS + Basic Auth
# 说明：
# - spring.elasticsearch.uris 只填 host:port（不带 http/https）
# - 通过 spring.elasticsearch.restclient.ssl.bundle 让 RestClient 走 HTTPS 并信任你的 CA
spring.elasticsearch.uris=https://127.0.0.1:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=tNR7q52re0BHNLJysg-9
spring.elasticsearch.restclient.ssl.bundle=eshttpca

# 信任 Elasticsearch 自动生成的 HTTP CA 证书（由 ES 启动日志给出）
# 路径来自：D:\elasticsearch\elasticsearch-8.14.3\config\certs\http_ca.crt
spring.ssl.bundle.pem.eshttpca.truststore.certificate=file:/D:/elasticsearch/elasticsearch-8.14.3/config/certs/http_ca.crt
